version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atgo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atgo_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-atgo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./infra/postgres/init_002_features.sql:/docker-entrypoint-initdb.d/01_features.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atgo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c max_connections=200
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_compression=on

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-atgo_redis_dev}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-atgo_redis_dev}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-atgo}:${POSTGRES_PASSWORD:-atgo_dev_password}@postgres:5432/${POSTGRES_DB:-atgo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-atgo_redis_dev}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BASE_DOMAIN: ${BASE_DOMAIN:-atgo.local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    command: >
      uvicorn atgo_api.main:app
      --host 0.0.0.0 --port 8000
      --reload
      --proxy-headers
      --forwarded-allow-ips="*"

  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://api.atgo.local}
      NEXT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN:-atgo.local}
      INTERNAL_API_BASE: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - portal
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-atgo.local}
      CF_API_TOKEN: ${CF_API_TOKEN:-}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
